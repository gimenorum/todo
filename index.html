<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="TODO" />
    <title>TODO</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <!-- 本番ビルド時に CSP <meta> を注入（vite.config.ts の inject-csp-meta）。dev は HMR のため除外。 -->
  </head>
  <body>
    <div id="app" aria-busy="true">読み込み中…</div>

    <!-- ui/dom.ts cloneTemplate() が複製する <template> 群（文字列連結による DOM 生成を禁止 / ch.07） -->
    <template id="tmpl-todo-item">
      <li class="todo-item" data-id="">
        <input type="checkbox" class="todo-done" aria-label="完了" />
        <button type="button" class="todo-open">
          <span class="todo-title"></span>
          <span class="todo-meta">
            <time class="todo-due"></time>
            <span class="todo-priority"></span>
            <span class="todo-tags"></span>
          </span>
        </button>
        <span class="todo-sync-badge" hidden></span>
        <button type="button" class="todo-resolve" hidden>同期エラーを解決する</button>
      </li>
    </template>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
