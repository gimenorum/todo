name: Deploy to GitHub Pages

# main のバージョンタグ（v*）でデプロイ（ch.15 §15.2）。
# 事前にリポジトリ設定で Pages の Source を「GitHub Actions」にしておくこと。
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # タグが main 上にあることを保証（要件「main のバージョンタグ基準」）。
      - name: Ensure tag is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag ${GITHUB_REF_NAME} is not on main; refusing to deploy."
            exit 1
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # PKCE public client の App key（クライアント同梱・秘密でない）。Vite が import.meta.env へ注入。
          # 未設定だと本番バンドルにキーが入らず Dropbox 連携が起動しない（ch.05 §5.4・ch.15）。
          VITE_DROPBOX_APP_KEY: ${{ vars.VITE_DROPBOX_APP_KEY }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
