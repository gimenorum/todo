name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main, 'feature/**']

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # 依存逆流 lint（ch.01 §1.5）を含む
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
