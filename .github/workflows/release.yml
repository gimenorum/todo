name: Release & Deploy

# main の更新（PR マージ）を起点に、package.json の version から未作成のタグを作成し、
# GitHub Release を自動作成（タイトル=タグ名／本文=自動生成ノート／v0.x.y はプレリリース）した上で、
# そのまま GitHub Pages へデプロイする（ch.15 §15.2/§15.3）。
# 注意: GITHUB_TOKEN で push したタグは他 workflow を起動しない仕様のため、
#       タグ event に頼らず本 workflow 内でデプロイまで完結させる。
# 手動/UI でのタグ発行（任意コミットの再デプロイ等）は従来どおり deploy.yml が処理する。
on:
  push:
    branches: [main]

permissions:
  contents: write # タグ作成のため（refs/tags/* への push。main ブランチは更新しない）
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
      created: ${{ steps.tag.outputs.created }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create version tag from package.json if new
        id: tag
        run: |
          version="v$(node -p "require('./package.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code origin "refs/tags/$version" >/dev/null 2>&1; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            echo "Tag $version already exists; nothing to release."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$version" -m "Release $version"
            git push origin "$version"
            echo "created=true" >> "$GITHUB_OUTPUT"
            echo "Created and pushed tag $version."
          fi
      - name: Create GitHub Release
        if: steps.tag.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ steps.tag.outputs.version }}"   # 例: v0.2.0
          # メジャー 0 系（Phase 0–4 / v0.x.y）はプレリリース、v1.0.0（Phase 5）以降は正式リリース。
          major="${version#v}"; major="${major%%.*}"
          prerelease=""
          if [ "$major" = "0" ]; then
            prerelease="--prerelease"
          fi
          # タイトル=タグ名、本文=自動生成ノート（直前タグはサーバ側で自動検出）。
          gh release create "$version" \
            --title "$version" \
            --generate-notes \
            $prerelease

  deploy:
    needs: tag
    if: needs.tag.outputs.created == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # PKCE public client の App key（クライアント同梱・秘密でない）。Vite が import.meta.env へ注入。
          # 未設定だと本番バンドルにキーが入らず Dropbox 連携が起動しない（ch.05 §5.4・ch.15）。
          VITE_DROPBOX_APP_KEY: ${{ vars.VITE_DROPBOX_APP_KEY }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
